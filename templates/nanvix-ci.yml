# ==========================================================================
# Nanvix Consumer CI Workflow Template
#
# Copy this file to .github/workflows/nanvix-ci.yml in your consumer repo.
# Search for "CUSTOMIZE:" comments and fill in project-specific values.
# Lines marked CUSTOMIZE that are commented out are optional examples.
#
# Placeholder convention:
#   PACKAGE  — your package name (e.g., zlib, sqlite, bzip2)
#
# Prerequisites:
#   - A .nanvix/z.py that subclasses ZScript
#   - A ./z bootstrap wrapper at the repo root
#   - A .nanvix/nanvix.toml manifest
# ==========================================================================

name: Nanvix CI

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["nanvix/**"]
  pull_request:
    branches: ["nanvix/**"]
  workflow_dispatch:
  # CUSTOMIZE: upstream dispatch event types for the dependency chain
  # repository_dispatch:
  #   types: [nanvix-minor-release]

permissions:
  contents: write
  actions: write
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: ${{ github.event_name == 'repository_dispatch' }}

jobs:
  get-nanvix-info:
    name: Get Nanvix Info
    runs-on: ubuntu-latest
    outputs:
      nanvix_tag: ${{ steps.resolve.outputs.nanvix_tag }}
      nanvix_sha: ${{ steps.resolve.outputs.nanvix_sha }}
      nanvix_version: ${{ steps.resolve.outputs.nanvix_version }}
      package_name: ${{ steps.resolve.outputs.package_name }}
      package_version: ${{ steps.resolve.outputs.package_version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install nanvix-zutil
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          WHEEL_URL=$(gh api repos/nanvix/zutils/releases/latest \
            --jq '.assets[] | select(.name | endswith(".whl")) | .browser_download_url')
          pip install "$WHEEL_URL"

      - name: Resolve lockfile and extract release info
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        # TODO: nanvix_zutils cli
        run: |
          python3 -c "
          import os
          from pathlib import Path
          from nanvix_zutil.manifest import load_manifest
          from nanvix_zutil.resolver import resolve

          manifest = load_manifest(Path('.nanvix/nanvix.toml'))
          lockfile = resolve(manifest, gh_token=os.environ.get('GH_TOKEN'), shallow=True)

          sysroot = next(
              (p for p in lockfile.packages if p.kind == 'sysroot'),
              None,
          )
          if sysroot is None:
              raise SystemExit('No sysroot package in lockfile — check .nanvix/nanvix.toml nanvix-version')
          with Path(os.environ['GITHUB_OUTPUT']).open('a') as f:
              f.write(
                  f'nanvix_tag={sysroot.resolved_tag}\n'
                  f'nanvix_sha={sysroot.resolved_commitish[:7]}\n'
                  f'nanvix_version={sysroot.resolved_tag.lstrip(\"v\")}\n'
                  f'package_name={manifest.name}\n'
                  f'package_version={manifest.version}\n'
              )
          "

      - name: Download Nanvix sysroot assets
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: |
          gh release download "${{ steps.resolve.outputs.nanvix_tag }}" \
            --repo nanvix/nanvix \
            --pattern "*.tar.bz2" \
            --dir nanvix-artifacts

      - name: Upload Nanvix artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanvix-release-artifacts
          path: nanvix-artifacts/*.tar.bz2
          retention-days: 1

  build:
    needs: get-nanvix-info
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        platform: [hyperlight, microvm]
        process-mode: [multi-process, single-process, standalone]
        memory: [128mb]
    name: ${{ matrix.platform }}-${{ matrix.process-mode }}-${{ matrix.memory }}
    container:
      image: nanvix/toolchain:latest-minimal
      options: --device /dev/kvm
    defaults:
      run:
        shell: bash
    env:
      NANVIX_MACHINE: ${{ matrix.platform }}
      NANVIX_DEPLOYMENT_MODE: ${{ matrix.process-mode }}
      NANVIX_MEMORY_SIZE: ${{ matrix.memory }}
      USER: runner
    steps:
      - uses: actions/checkout@v4

      - name: Download Nanvix artifacts
        uses: actions/download-artifact@v4
        with:
          name: nanvix-release-artifacts
          path: nanvix-artifacts

      - name: Extract matching sysroot
        run: |
          set -euo pipefail
          PATTERN="${{ matrix.platform }}.*${{ matrix.process-mode }}.*${{ matrix.memory }}.*\.tar\.bz2"
          ARTIFACT=$(find nanvix-artifacts -maxdepth 1 -type f -name "*.tar.bz2" \
            | grep -E "$PATTERN" | head -1)
          if [[ -z "$ARTIFACT" ]]; then
            echo "::error::No sysroot artifact for ${{ matrix.platform }}/${{ matrix.process-mode }}/${{ matrix.memory }}"
            exit 1
          fi
          mkdir -p nanvix-artifacts/extracted
          tar -xjf "$ARTIFACT" -C nanvix-artifacts/extracted

      - name: Setup
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || github.token }}
        run: ./z setup

      - name: Build
        run: ./z build

      - name: Test
        if: matrix.process-mode != 'standalone'
        run: ./z test

      # CUSTOMIZE: standalone test targets may vary by consumer
      - name: Test (standalone — smoke + integration only)
        if: matrix.process-mode == 'standalone'
        run: ./z test -- test-smoke test-integration

      - name: Release
        if: success()
        run: ./z release

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.get-nanvix-info.outputs.package_name }}-${{ needs.get-nanvix-info.outputs.package_version }}-${{ matrix.platform }}-${{ matrix.process-mode }}-${{ matrix.memory }}
          path: dist/*.tar.bz2
          retention-days: 7

      - name: Collect failure logs
        if: failure()
        run: |
          mkdir -p ci-logs
          cp -f /tmp/*.log ci-logs/ 2>/dev/null || true
          find .nanvix -type f -name "*.log" -exec cp -f {} ci-logs/ \; 2>/dev/null || true

      - name: Upload failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-logs-${{ matrix.platform }}-${{ matrix.process-mode }}
          path: ci-logs/*
          if-no-files-found: warn

  release:
    needs: [get-nanvix-info, build]
    if: ${{ !cancelled() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        id: download-artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          path: release-artifacts
          pattern: ${{ needs.get-nanvix-info.outputs.package_name }}-${{ needs.get-nanvix-info.outputs.package_version }}-*

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          if [[ "${{ steps.download-artifacts.outcome }}" == "failure" ]]; then
            echo "::warning::Artifact download failed — possible API or network issue"
          fi
          find release-artifacts -name "*.tar.bz2" -exec cp {} release-assets/ \; 2>/dev/null || true
          ASSET_COUNT=$(find release-assets -name "*.tar.bz2" 2>/dev/null | wc -l)
          echo "Found $ASSET_COUNT release asset(s)"
          if [[ "$ASSET_COUNT" -eq 0 ]]; then
            echo "::error::No release assets found — all matrix builds may have failed"
            exit 1
          fi
          ls -la release-assets/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ needs.get-nanvix-info.outputs.package_version }}-nanvix-${{ needs.get-nanvix-info.outputs.nanvix_version }}"

          # Idempotency: skip if release already exists
          if gh release view "$RELEASE_TAG" &>/dev/null; then
            echo "Release $RELEASE_TAG already exists — skipping"
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --title "Build ${GITHUB_SHA::7}" \
            --notes "Automated build from branch ${{ github.ref_name }}.

          **Build:** [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit:** [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
          **Nanvix:** [${{ needs.get-nanvix-info.outputs.nanvix_sha }}](https://github.com/nanvix/nanvix/commit/${{ needs.get-nanvix-info.outputs.nanvix_sha }})" \
            --latest \
            release-assets/*.tar.bz2

      # CUSTOMIZE: trigger downstream repos after successful release (only real customization needed)
      # - name: Trigger dependent workflows
      #   if: success()
      #   env:
      #     GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      #   run: |
      #     RELEASE_TAG="${{ needs.get-nanvix-info.outputs.package_version }}-nanvix-${{ needs.get-nanvix-info.outputs.nanvix_version }}"
      #     gh api repos/nanvix/DOWNSTREAM/dispatches \
      #       -X POST \
      #       -H "Accept: application/vnd.github+json" \
      #       -f event_type="PACKAGE-release" \
      #       -f "client_payload[nanvix_version]=${{ needs.get-nanvix-info.outputs.nanvix_version }}" \
      #       -f "client_payload[PACKAGE_tag]=${RELEASE_TAG}"

  report-failure:
    needs: [build, release]
    if: >-
      ${{ always() &&
          (github.event_name == 'push' ||
           github.event_name == 'schedule' ||
           github.event_name == 'repository_dispatch') &&
          (needs.build.result == 'failure' ||
           needs.release.result == 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - name: Report failure issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = `CI failure`;
            const body = [
              `CI workflow failed.`,
              `- Trigger: ${context.eventName}`,
              `- Run: [#${context.runNumber}](${runUrl})`,
              `- SHA: ${context.sha}`,
              '',
              'Please investigate and take corrective action.'
            ].join('\n');

            const { data: search } = await github.rest.search.issuesAndPullRequests({
              q: `repo:${owner}/${repo} is:issue is:open in:title "CI failure"`
            });
            const existing = search.items.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: existing.number, body
              });
            } else {
              await github.rest.issues.create({
                owner, repo, title, body,
                // CUSTOMIZE: assignees
                assignees: []
              });
            }
