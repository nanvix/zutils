name: Nanvix CI

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["nanvix/**"]
  pull_request:
    branches: ["nanvix/**"]
  workflow_dispatch:

permissions:
  contents: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name || github.ref || 'default' }}
  cancel-in-progress: true

jobs:
  format-and-lint:
    uses: nanvix/workflows/.github/workflows/nanvix-format-lint.yml@v{{WORKFLOW_VERSION}}
    with:
      zutil-version: "v{{ZUTIL_VERSION}}"
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}

  ci:
    uses: nanvix/workflows/.github/workflows/nanvix-ci.yml@v{{WORKFLOW_VERSION}}
    with:
      zutil-version: "v{{ZUTIL_VERSION}}"
      caller-event-name: ${{ github.event_name }}
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
