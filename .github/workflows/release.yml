name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (must match pyproject.toml, e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write # create tags and GitHub releases
  id-token: write # OIDC trusted publishing to PyPI

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Verify version matches pyproject.toml
        run: |
          actual=$(python -c "import tomllib; d=tomllib.load(open('pyproject.toml','rb')); print(d['project']['version'])")
          if [ "$actual" != "${{ inputs.version }}" ]; then
            echo "Version mismatch: pyproject.toml=$actual input=${{ inputs.version }}"
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ inputs.version }}" | grep -q .; then
            echo "Tag v${{ inputs.version }} already exists on origin. Bump the version in pyproject.toml before releasing."
            exit 1
          fi

      - name: Build wheel and sdist
        run: uv build

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ inputs.version }}"
          git push origin "v${{ inputs.version }}"

      - name: Create GitHub release
        run: |
          gh release create "v${{ inputs.version }}" \
            dist/* \
            --title "nanvix-zutil v${{ inputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Publish to PyPI
        run: uv publish
