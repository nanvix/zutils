name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  contents: write  # create tags and GitHub releases
  id-token: write  # OIDC trusted publishing to PyPI

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Check formatting (black)
        run: uv run black --check src/ tests/

      - name: Type check (pyright)
        run: uv run pyright src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nanvix/toolchain-gcc@sha256:ea33e4cae4041dcf55f0ec49f58de90ae1b5e9fb7c3c507971b40975b14aecd3
    env:
      NANVIX_TOOLCHAIN: /opt/nanvix
      USER: runner
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install project and dev dependencies
        run: uv sync --python 3.12

      - name: Run tests
        run: uv run pytest tests/ -v

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: none
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: uv sync

      - name: Verify import succeeds
        run: uv run python -c "import nanvix_zutil; print('import OK')"

      - name: Run unit tests
        run: uv run pytest tests/ -v

  release:
    name: Build & Publish
    needs: [lint-and-typecheck, test, test-windows]
    runs-on: ubuntu-latest
    environment: release
    concurrency:
      group: release-zutils
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          token: ${{ secrets.DISPATCH_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Release
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: uv run tasks.py release --ci ${{ inputs.bump }}
