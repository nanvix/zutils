name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install shfmt
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v3.13.0/shfmt_v3.13.0_linux_amd64" -o /tmp/shfmt
          sudo install -m 755 /tmp/shfmt /usr/local/bin/shfmt

      - name: Install dependencies
        run: uv sync

      - name: Lint (black, shfmt, shellcheck, PSScriptAnalyzer, yamllint)
        run: uv run tasks.py lint

      - name: Type check (pyright)
        run: uv run pyright src/ tests/

      - name: Type check downstream_tests
        run: uv run pyright src/downstream_tests/ scripts/downstream/wrapper.py

  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: >
          uv run pytest tests/ -v
          --ignore=tests/test_example.py
          --ignore=tests/test_example_bin_hello.py

      - name: Run downstream_tests unit tests
        run: uv run pytest src/downstream_tests/tests/ -v
        env:
          PYTHONPATH: src

  integration-tests:
    name: Integration Tests (ubuntu-24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Pull Docker image
        run: docker pull nanvix/toolchain:latest-minimal

      - name: Setup (lib-hello)
        working-directory: examples/lib-hello
        run: uv run nanvix-zutil setup --with-docker

      - name: Build (lib-hello)
        working-directory: examples/lib-hello
        run: uv run nanvix-zutil build

      - name: Test (lib-hello)
        working-directory: examples/lib-hello
        run: uv run nanvix-zutil test

      - name: Upload build artifacts for Windows test
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-artifacts
          path: |
            examples/**/*.elf
            examples/**/*.a
          retention-days: 1
          if-no-files-found: warn

      - name: Clean (lib-hello)
        working-directory: examples/lib-hello
        run: uv run nanvix-zutil clean

  integration-tests-windows:
    name: Integration Tests (windows-latest)
    needs: [integration-tests]
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          name: integration-test-artifacts
          path: examples

      - name: Pull Docker image
        run: docker pull nanvix/toolchain:latest-minimal

      - name: Setup (lib-hello)
        working-directory: examples/lib-hello
        run: uv run nanvix-zutil setup

      - name: Test (lib-hello)
        working-directory: examples/lib-hello
        run: uv run nanvix-zutil test
