name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install shfmt
        run: |
          set -euxo pipefail
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v3.13.0/shfmt_v3.13.0_linux_amd64" -o /tmp/shfmt
          sudo install -m 755 /tmp/shfmt /usr/local/bin/shfmt

      - name: Install dependencies
        run: uv sync

      - name: Lint (black, shfmt, shellcheck, PSScriptAnalyzer, yamllint)
        run: uv run tasks.py lint

      - name: Type check (basedpyright)
        run: uv run basedpyright src/ tests/

      - name: Type check downstream_tests
        run: uv run basedpyright src/downstream_tests/ scripts/downstream/wrapper.py

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: nanvix/toolchain:latest-minimal
      options: --device /dev/kvm
    env:
      NANVIX_TOOLCHAIN: /opt/nanvix
      USER: runner
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install project and dev dependencies
        run: uv sync --python 3.12

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Run downstream_tests unit tests
        run: uv run pytest src/downstream_tests/tests/ -v
        env:
          PYTHONPATH: src

  test-windows:
    name: Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install project and dev dependencies
        run: uv sync

      - name: Verify import succeeds
        run: uv run python -c "import nanvix_zutil; print('import OK')"

      - name: Run unit tests
        run: uv run pytest tests/ -v

      - name: Run downstream_tests unit tests
        run: uv run pytest src/downstream_tests/tests/ -v
        env:
          PYTHONPATH: src

  test-downstream-linux:
    name: Downstream Consumers (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Pre-fetch consumer list (best-effort)
        shell: bash
        run: |
          set -eu
          curl -fsSL \
            https://raw.githubusercontent.com/nanvix/workflows/refs/heads/main/consumer-repos.json \
            -o scripts/downstream/consumer-repos.json || \
            echo "::warning::Failed to pre-fetch consumer-repos.json; runner will fall back"

      - name: Configure git auth for consumer checkouts
        shell: bash
        run: |
          set -eu
          TOKEN="${DISPATCH_TOKEN:-$GH_TOKEN}"
          git config --global \
            url."https://x-access-token:${TOKEN}@github.com/".insteadOf \
            "https://github.com/"

      - name: Cache consumer checkouts
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/consumers
          key: downstream-consumers-${{ runner.os }}-${{ hashFiles('scripts/downstream/consumer-repos.json') }}
          restore-keys: |
            downstream-consumers-${{ runner.os }}-

      - name: Run downstream consumer tests
        shell: bash
        run: |
          uv run tasks.py downstream --platform=linux \
            -- --repos-root "${{ runner.temp }}/consumers" --setup-only

  test-downstream-windows:
    name: Downstream Consumers (Windows)
    runs-on: windows-latest
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Pre-fetch consumer list (best-effort)
        shell: bash
        run: |
          set -eu
          curl -fsSL \
            https://raw.githubusercontent.com/nanvix/workflows/refs/heads/main/consumer-repos.json \
            -o scripts/downstream/consumer-repos.json || \
            echo "::warning::Failed to pre-fetch consumer-repos.json; runner will fall back"

      - name: Configure git auth for consumer checkouts
        shell: bash
        run: |
          set -eu
          TOKEN="${DISPATCH_TOKEN:-$GH_TOKEN}"
          git config --global \
            url."https://x-access-token:${TOKEN}@github.com/".insteadOf \
            "https://github.com/"

      - name: Cache consumer checkouts
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/consumers
          key: downstream-consumers-${{ runner.os }}-${{ hashFiles('scripts/downstream/consumer-repos.json') }}
          restore-keys: |
            downstream-consumers-${{ runner.os }}-

      - name: Run downstream consumer tests
        shell: bash
        run: |
          uv run tasks.py downstream --platform=windows \
            -- --repos-root "${{ runner.temp }}/consumers" --setup-only
