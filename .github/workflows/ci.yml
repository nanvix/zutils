name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install shfmt
        run: |
          curl -sS https://webinstall.dev/shfmt@v3.8.0 | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install PSScriptAnalyzer
        run: pwsh -NoProfile -Command "Install-Module PSScriptAnalyzer -Force -Scope CurrentUser"

      - name: Install dependencies
        run: uv sync

      - name: Lint (black, shfmt, shellcheck, PSScriptAnalyzer, yamllint)
        run: uv run tasks.py lint

      - name: Type check (basedpyright)
        run: uv run basedpyright src/ tests/

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      image: nanvix/toolchain:latest-minimal
      options: --device /dev/kvm
    env:
      NANVIX_TOOLCHAIN: /opt/nanvix
      USER: runner
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install project and dev dependencies
        run: uv sync --python 3.12

      - name: Run tests
        run: uv run pytest tests/ -v
