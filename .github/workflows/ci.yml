name: CI

on:
  push:
    branches: ["dev", "main"]
  pull_request:
    branches: ["dev", "main"]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint & Type Check (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install shfmt
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          curl -fsSL "https://github.com/mvdan/sh/releases/download/v3.13.0/shfmt_v3.13.0_linux_amd64" -o /tmp/shfmt
          sudo install -m 755 /tmp/shfmt /usr/local/bin/shfmt

      - name: Install dependencies
        run: uv sync

      - name: Lint (black, shfmt, shellcheck, PSScriptAnalyzer, yamllint)
        run: uv run tasks.py lint

      - name: Type check (pyright)
        run: uv run pyright src/ tests/

  unit-tests:
    name: Unit Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-latest]
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: >
          uv run pytest tests/ -v
          --ignore=tests/test_examples.py

  integration-tests:
    name: Integration Tests (ubuntu-24.04)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Build & test examples
        run: uv run pytest tests/test_examples.py -v -k "not Cleanup"

      - name: Upload build artifacts for Windows test
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: integration-test-artifacts
          path: |
            examples/**/*.elf
            examples/**/*.a
            examples/lib-hello/.nanvix/sysroot/bin/
            examples/lib-hello/.nanvix/sysroot/lib/
          retention-days: 1
          if-no-files-found: warn

      - name: Clean examples
        run: uv run pytest tests/test_examples.py -v -k "Cleanup"

  integration-tests-windows:
    name: Integration Tests (windows-latest)
    needs: [integration-tests]
    runs-on: windows-latest
    timeout-minutes: 15
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Download Linux build artifacts
        uses: actions/download-artifact@v4
        with:
          name: integration-test-artifacts
          path: examples

      - name: Test examples
        run: uv run pytest tests/test_examples.py -v
